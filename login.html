<body class="bg-background text-on-background font-body-md selection:bg-primary selection:text-on-primary overflow-x-hidden min-h-screen flex flex-col">
<!-- Header Suppression: Handled by focusing strictly on the Login Form journey -->
<header class="w-full py-md px-gutter flex justify-between items-center max-w-container-max mx-auto">
<div class="flex items-center gap-sm">
<img alt="foodForALL Logo" class="h-10 w-10 object-contain rounded-lg" src="https://lh3.googleusercontent.com/aida/ADBb0uh8hX3Gv_lUQqOQV9m1I9hRoM01DpdA6fkfTS_YrCyzqJl4YQSc2P4kw2-Z8Gu8iXiGl3m6GKKcccuKM6FX0DIC_tcR15hBHmVcw8rNK6yQkW9QOOlldlV4b4QZSqMfGTmrfLeJVh8EPqrKWkCiFJupoDw3GiS82C-6CfAxyQhUoYYvCRBZ5P8QPeWcyFgxA1N3lBJ39a30PWzIo4Y0vCVW_esROaL1OX4RsK_GvEatxrfjmja4c2DuQCs"/>
<span class="font-headline-md text-headline-md font-bold text-primary tracking-tight">foodForALL</span>
</div>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors duration-200" href="#">
            Return to Mission
        </a>
</header>
<main class="flex-grow flex items-center justify-center px-gutter py-xl relative overflow-hidden">
<!-- Atmospheric Background Elements -->
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-tertiary/10 blur-[100px] rounded-full pointer-events-none"></div>
<div class="w-full max-w-[480px] z-10">
<!-- Login Card -->
<div class="bg-surface-container border border-outline-variant/30 rounded-full p-lg md:p-xl shadow-[0px_8px_32px_rgba(0,0,0,0.4)] backdrop-blur-sm">
<div class="mb-lg">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Log in to continue rescuing surplus food.</p>
</div>
<!-- Role Toggle -->
<div class="bg-surface-variant p-1 rounded-xl flex mb-lg relative">
<div class="absolute h-[calc(100%-8px)] w-[calc(50%-4px)] bg-primary-container rounded-lg transition-all duration-300 transform translate-x-0" id="role-indicator"></div>
<button class="relative z-10 flex-1 py-base font-label-md text-label-md text-on-primary-container text-center transition-colors duration-300" id="user-toggle" onclick="switchRole('user')">
                        Community Member
                    </button>
<button class="relative z-10 flex-1 py-base font-label-md text-label-md text-on-surface-variant text-center transition-colors duration-300" id="vendor-toggle" onclick="switchRole('vendor')">
                        Food Vendor
                    </button>
</div>
<form class="space-y-base" id="login-form">
<!-- Email Field -->
<div class="space-y-xs group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-primary transition-colors" for="email">Email ID</label>
<div class="relative vibrant-glow rounded-lg">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-sm pl-11 pr-sm text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary transition-all duration-200" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs group">
<label class="font-label-md text-label-md text-on-surface-variant group-focus-within:text-primary transition-colors" for="password">Password</label>
<div class="relative vibrant-glow rounded-lg">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-sm pl-11 pr-11 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="visibility-icon">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-xs">
<div class="flex items-center gap-xs">
<input class="w-4 h-4 rounded bg-surface-container-highest border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-caption text-caption text-on-surface-variant" for="remember">Remember me</label>
</div>
<a class="font-caption text-caption text-tertiary-fixed hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary hover:bg-primary-fixed-dim text-on-primary font-label-md text-label-md py-sm rounded-full transition-all duration-200 active:scale-[0.98] shadow-lg shadow-primary/20 mt-sm" type="submit">
                        Sign In
                    </button>
</form>
<div class="mt-lg pt-lg border-t border-outline-variant flex flex-col items-center gap-base">
<p class="font-body-md text-body-md text-on-surface-variant">Don't have an account?</p>
<button class="w-full border-2 border-tertiary hover:bg-tertiary/10 text-tertiary font-label-md text-label-md py-sm rounded-full transition-all duration-200 flex items-center justify-center gap-sm">
                        Create New Account
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</div>
<!-- Identity Footer -->
<div class="mt-lg text-center">
<p class="font-caption text-caption text-on-surface-variant/60">
                    © 2024 foodForALL. Powered by Kindness &amp; Vitality.
                </p>
</div>
</div>
</main>
<!-- Micro-interactions Script -->
<script>
        function switchRole(role) {
            const indicator = document.getElementById('role-indicator');
            const userBtn = document.getElementById('user-toggle');
            const vendorBtn = document.getElementById('vendor-toggle');
            
            if (role === 'vendor') {
                indicator.style.transform = 'translateX(100%)';
                vendorBtn.classList.remove('text-on-surface-variant');
                vendorBtn.classList.add('text-on-primary-container');
                userBtn.classList.remove('text-on-primary-container');
                userBtn.classList.add('text-on-surface-variant');
            } else {
                indicator.style.transform = 'translateX(0%)';
                userBtn.classList.remove('text-on-surface-variant');
                userBtn.classList.add('text-on-primary-container');
                vendorBtn.classList.remove('text-on-primary-container');
                vendorBtn.classList.add('text-on-surface-variant');
            }
        }

        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('visibility-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                input.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Form submission prevent default for demo
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerText = 'Authenticating...';
            btn.disabled = true;
            btn.classList.add('opacity-70');
            
            setTimeout(() => {
                btn.innerText = 'Success!';
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-tertiary-container', 'text-on-tertiary-container');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                    btn.classList.remove('opacity-70', 'bg-tertiary-container', 'text-on-tertiary-container');
                    btn.classList.add('bg-primary');
                }, 1500);
            }, 1000);
        });
    </script>
</body></html>
